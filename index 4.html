<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Everyday Refrigerator Poetry</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #08090e;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans",
    "Noto Sans CJK JP", "Noto Sans JP", "Noto Sans KR", "Noto Sans SC", sans-serif;
}
canvas {
  display: block;
}
button {
  position: fixed;
  left: 10px;
  z-index: 10;
  border: 1px solid rgba(180, 220, 255, 0.45);
  color: white;
  background: rgba(10, 20, 35, 0.62);
  backdrop-filter: blur(8px);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  font-family: inherit;
}
#scatter { top: 10px; }
#shuffle { top: 54px; }
</style>
</head>
<body>
<button id="scatter">Scatter Magnets and Start Over</button>
<button id="shuffle">Shuffle Poem</button>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

let magnets = [];
let poemMagnets = [];
let particles = [];
let selected = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
let moved = false;
let frame = 0;

const palette = [
  [255, 80, 155],
  [255, 135, 70],
  [255, 220, 95],
  [100, 255, 185],
  [80, 225, 255],
  [120, 145, 255],
  [205, 110, 255]
];

const determiners = [
  "the","a","this","that","my","your","our",
  "这","那","我的","你的","一个",
  "이","그","내","너의","우리",
  "この","その","私の","君の","あの",
  "le","la","un","une","ce","cette","mon","ton","notre"
];

const adjectives = [
  "fresh","cold","warm","sweet","tiny","plastic","silver","blue","red","green","cheap","broken","soft","empty","late","lost",
  "新鲜","冰冷","温暖","甜的","小小的","塑料","银色","蓝色","红色","绿色","便宜","坏掉的","柔软","空的",
  "신선한","차가운","따뜻한","달콤한","작은","플라스틱","은빛","파란","빨간","초록","싼","고장난","부드러운","빈",
  "新鮮な","冷たい","暖かい","甘い","小さい","プラスチックの","銀色の","青い","赤い","緑の","安い","壊れた","柔らかい","空っぽの",
  "frais","froid","chaud","sucré","petit","plastique","argenté","bleu","rouge","vert","cassé","doux","vide"
];

const nouns = [
  "watermelon","strawberry","banana","apple","orange","lemon","tomato","cucumber","rice","ramen","kimchi","tofu","egg","cheese","yogurt","milk","coffee","tea","bread","butter","honey","cookie","noodle","dumpling","garlic","onion","potato","cake","sandwich","soup",
  "西瓜","草莓","香蕉","苹果","橘子","柠檬","番茄","黄瓜","米饭","拉面","泡菜","豆腐","鸡蛋","奶酪","酸奶","牛奶","咖啡","茶","面包","黄油","蜂蜜","饼干","饺子","大蒜","洋葱","土豆","蛋糕","汤",
  "수박","딸기","바나나","사과","오렌지","레몬","토마토","오이","밥","라면","김치","두부","계란","치즈","요거트","우유","커피","차","빵","버터","꿀","쿠키","만두","마늘","양파","감자","케이크","국",
  "すいか","いちご","バナナ","りんご","みかん","レモン","トマト","きゅうり","ご飯","ラーメン","キムチ","豆腐","卵","チーズ","ヨーグルト","牛乳","コーヒー","お茶","パン","バター","はちみつ","クッキー","餃子","にんにく","玉ねぎ","じゃがいも","ケーキ","味噌汁",
  "pastèque","fraise","banane","pomme","orange","citron","tomate","concombre","riz","ramen","kimchi","tofu","œuf","fromage","yaourt","lait","café","thé","pain","beurre","miel","biscuit","ravioli","ail","oignon","pomme de terre","gâteau","soupe",
  "chair","table","window","door","key","wallet","phone","laptop","camera","pencil","notebook","umbrella","shoe","sock","towel","blanket","lamp","mirror","radio","television","ticket","receipt","bag","bottle","cup","plate","spoon","fork","knife",
  "station","library","museum","bakery","market","school","garden","bridge","beach","river","tree","cloud","rain","cat","dog","fish","whale","rabbit","bird","fox",
  "椅子","桌子","窗户","门","钥匙","钱包","手机","电脑","相机","铅笔","笔记本","雨伞","鞋子","袜子","毛巾","毯子","灯","镜子","电视","车票","包","瓶子","杯子",
  "의자","테이블","창문","문","열쇠","지갑","휴대폰","노트북","카메라","연필","우산","신발","양말","수건","담요","거울","가방","컵","고양이","개",
  "椅子","テーブル","窓","ドア","鍵","財布","スマホ","パソコン","カメラ","鉛筆","傘","靴","靴下","タオル","毛布","鏡","バッグ","コップ","猫","犬",
  "chaise","table","fenêtre","porte","clé","téléphone","ordinateur","caméra","crayon","parapluie","chaussure","miroir","sac","tasse","chat","chien"
];

const verbs = [
  "waits","opens","falls","rolls","melts","returns","shines","floats","drifts","spills","rings","sleeps","remembers","vanishes",
  "等待","打开","落下","滚动","融化","回来","发光","漂浮","洒出","响起","睡觉","记得","消失",
  "기다린다","열린다","떨어진다","녹는다","돌아온다","빛난다","뜬다","흐른다","잠든다","기억한다","사라진다",
  "待つ","開く","落ちる","溶ける","戻る","光る","浮かぶ","漂う","眠る","覚えている","消える",
  "attend","tombe","roule","fond","revient","brille","flotte","dérive","sonne","dort","disparaît"
];

const adverbs = [
  "slowly","softly","again","tonight","nearby","quietly","almost","suddenly",
  "慢慢地","轻轻地","再次","今晚","附近","安静地","突然",
  "천천히","부드럽게","다시","오늘밤","조용히","갑자기",
  "ゆっくり","そっと","また","今夜","静かに","突然",
  "lentement","doucement","encore","ce soir","silencieusement","soudain"
];

const prepositions = [
  "beside","inside","under","above","near","through","behind","around",
  "旁边","里面","下面","上方","附近","穿过","后面",
  "옆에","안에","아래에","위에","가까이","뒤에",
  "そばに","中で","下に","上に","近く","後ろに",
  "près de","dans","sous","au-dessus","derrière"
];

const allWords = [...new Set([...determiners, ...adjectives, ...nouns, ...verbs, ...adverbs, ...prepositions])];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function random(a, b) { return a + Math.random() * (b - a); }

function hashWord(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
  return h;
}

function colorForWord(word) {
  return palette[hashWord(word.toLowerCase()) % palette.length];
}

function gaussian() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function makeDisplayText(m) {
  let t = m.override || m.word;
  if (m.cap && /^[a-zA-ZÀ-ÿ]/.test(t)) t = t[0].toUpperCase() + t.slice(1);
  return t + (m.suffix || "");
}

function measureMagnet(m) {
  ctx.font = `${13 * scale()}px system-ui, sans-serif`;
  const text = makeDisplayText(m);
  m.w = ctx.measureText(text).width + 22 * scale();
  m.h = 32 * scale();
}

function scale() {
  return H / 628;
}

class Magnet {
  constructor(word, x, y) {
    this.word = word;
    this.x = x;
    this.y = y;
    this.tx = x;
    this.ty = y;
    this.vx = 0;
    this.vy = 0;
    this.a = random(-0.12, 0.12);
    this.ta = this.a;
    this.va = 0;
    this.homeX = x;
    this.homeY = y;
    this.inPoem = false;
    this.cap = false;
    this.suffix = "";
    this.override = "";
    this.selected = false;
    measureMagnet(this);
  }

  surface() {
    return (this.override || this.word).toLowerCase();
  }

  update() {
    this.vx += (this.tx - this.x) * SPRING_K - this.vx * DAMPING;
    this.vy += (this.ty - this.y) * SPRING_K - this.vy * DAMPING;
    this.x += this.vx;
    this.y += this.vy;
    this.va += (this.ta - this.a) * ANG_K - this.va * ANG_DAMP;
    this.a += this.va;
  }

  hit(mx, my) {
    return Math.abs(mx - this.x) < this.w / 2 && Math.abs(my - this.y) < this.h / 2;
  }

  draw() {
    const text = makeDisplayText(this);
    ctx.save();
    ctx.translate(W / 2 + this.x, H / 2 + this.y);
    ctx.rotate(this.a);

    ctx.fillStyle = "rgba(0,0,0,0.34)";
    roundRect(2, 2, this.w, this.h, 5);
    ctx.fill();

    ctx.fillStyle = this.selected ? "#d8d8d8" : "#ffffff";
    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = 1;
    roundRect(0, 0, this.w, this.h, 5);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `${13 * scale()}px system-ui, sans-serif`;
    ctx.fillText(text, 0, 1);
    ctx.restore();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x - w/2 + r, y - h/2);
  ctx.lineTo(x + w/2 - r, y - h/2);
  ctx.quadraticCurveTo(x + w/2, y - h/2, x + w/2, y - h/2 + r);
  ctx.lineTo(x + w/2, y + h/2 - r);
  ctx.quadraticCurveTo(x + w/2, y + h/2, x + w/2 - r, y + h/2);
  ctx.lineTo(x - w/2 + r, y + h/2);
  ctx.quadraticCurveTo(x - w/2, y + h/2, x - w/2, y + h/2 - r);
  ctx.lineTo(x - w/2, y - h/2 + r);
  ctx.quadraticCurveTo(x - w/2, y - h/2, x - w/2 + r, y - h/2);
}

function makeBackground() {
  bg = document.createElement("canvas");
  bg.width = W;
  bg.height = H;
  const b = bg.getContext("2d");
  b.fillStyle = "#08090e";
  b.fillRect(0, 0, W, H);
  b.textAlign = "center";
  b.textBaseline = "middle";
  b.font = "12px system-ui";
  const chars = ["🍉","夢","빛","月","r","ê","0","1","夜","駅","猫","꽃","m","n","茶","김"];
  for (let y = 0; y < H; y += 18) {
    for (let x = 0; x < W; x += 18) {
      b.fillStyle = `rgba(180,220,255,${random(0.03,0.1)})`;
      b.fillText(rand(chars), x, y);
    }
  }
  b.strokeStyle = "rgba(255,255,255,0.04)";
  for (let y = 0; y < H; y += 3) {
    b.beginPath();
    b.moveTo(0, y);
    b.lineTo(W, y);
    b.stroke();
  }
}

function makeMagnets() {
  magnets = [];
  for (const word of allWords) {
    let x = random(-W * 0.47, W * 0.47);
    let y = random(-H * 0.43, H * 0.43);
    if (Math.abs(x) < W * 0.2) x += W * 0.28 * (Math.random() < 0.5 ? -1 : 1);
    if (Math.abs(y) < H * 0.13) y += H * 0.28 * (Math.random() < 0.5 ? -1 : 1);
    magnets.push(new Magnet(word, x, y));
  }
}

function makePoem() {
  for (const m of magnets) {
    if (m.inPoem) {
      m.inPoem = false;
      m.cap = false;
      m.suffix = "";
      m.override = "";
      m.tx = m.homeX;
      m.ty = m.homeY;
      m.ta = random(-0.12, 0.12);
      measureMagnet(m);
    }
  }

  const templates = [
    ["DET","ADJ","NOUN","VERB","ADV","PREP","DET","NOUN"],
    ["DET","NOUN","VERB","PREP","DET","ADJ","NOUN","ADV"],
    ["DET","NOUN","VERB","ADV","PREP","DET","NOUN","NOUN"],
    ["ADJ","NOUN","VERB","PREP","DET","NOUN","ADV","NOUN"]
  ];
  const template = rand(templates);

  const chosenWords = template.map(tag => {
    if (tag === "DET") return rand(determiners);
    if (tag === "ADJ") return rand(adjectives);
    if (tag === "NOUN") return rand(nouns);
    if (tag === "VERB") return rand(verbs);
    if (tag === "ADV") return rand(adverbs);
    if (tag === "PREP") return rand(prepositions);
  });

  const chosen = chosenWords.map(w => magnets.find(m => m.word === w)).filter(Boolean);
  if (chosen.length < 8) return;

  chosen.forEach(m => {
    m.cap = false;
    m.suffix = "";
    m.override = "";
    measureMagnet(m);
  });
  chosen[0].cap = true;
  chosen[7].suffix = ".";
  chosen.forEach(measureMagnet);

  let gap = 10 * scale();
  let totalW = chosen.reduce((s, m) => s + m.w, 0) + gap * 7;
  let x = -totalW / 2;

  poemMagnets = [];
  for (const m of chosen) {
    m.inPoem = true;
    m.tx = x + m.w / 2;
    m.ty = 0;
    m.ta = 0;
    poemMagnets.push(m);
    x += m.w + gap;
  }

  triggerFog();
}

function triggerFog() {
  particles = [];
  if (poemMagnets.length === 0) return;

  for (let i = 0; i < poemMagnets.length; i++) {
    const m = poemMagnets[i];
    const c = colorForWord(m.surface());
    const baseX = W / 2 + m.tx;
    const baseY = H / 2 + m.ty;

    for (let j = 0; j < 180; j++) {
      particles.push({
        x: baseX + gaussian() * 80 * scale(),
        y: baseY + gaussian() * 28 * scale(),
        vx: random(-0.35, 0.35),
        vy: random(-0.18, 0.18),
        color: c,
        age: -i * 3 - random(0, 16),
        life: random(110, 165),
        radius: random(24, 90) * scale(),
        alpha: random(0.035, 0.11),
        seed: random(0, 1000)
      });
    }
  }

  const first = poemMagnets[0];
  const last = poemMagnets[poemMagnets.length - 1];

  for (let j = 0; j < 900; j++) {
    const t = Math.random();
    const c = palette[Math.min(palette.length - 1, Math.floor(t * palette.length))];
    particles.push({
      x: W / 2 + first.tx + (last.tx - first.tx) * t + gaussian() * 55 * scale(),
      y: H / 2 + gaussian() * 48 * scale(),
      vx: random(-0.22, 0.22),
      vy: random(-0.12, 0.12),
      color: c,
      age: -random(0, 28),
      life: random(125, 185),
      radius: random(35, 120) * scale(),
      alpha: random(0.018, 0.065),
      seed: random(0, 1000)
    });
  }
}

function drawFog() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  for (const p of particles) {
    p.age++;
    if (p.age < 0 || p.age > p.life) continue;

    const t = p.age / p.life;
    const bloom = Math.pow(Math.sin(Math.PI * t), 0.8);

    const wobble = Math.sin(frame * 0.012 + p.seed) * 0.35;
    p.x += p.vx + Math.cos(p.seed + frame * 0.006) * 0.17;
    p.y += p.vy + Math.sin(p.seed + frame * 0.005) * 0.10;

    const r = p.radius * (0.7 + t * 1.45);
    const a = p.alpha * bloom;

    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    g.addColorStop(0, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${a})`);
    g.addColorStop(0.42, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${a * 0.45})`);
    g.addColorStop(1, `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0)`);
    ctx.fillStyle = g;

    ctx.beginPath();
    ctx.ellipse(p.x, p.y, r * (1.25 + wobble), r * 0.42, p.seed, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
  particles = particles.filter(p => p.age <= p.life);
}

function swapWord(m) {
  let pool = nouns;
  if (determiners.includes(m.word)) pool = determiners;
  else if (adjectives.includes(m.word)) pool = adjectives;
  else if (nouns.includes(m.word)) pool = nouns;
  else if (verbs.includes(m.word)) pool = verbs;
  else if (adverbs.includes(m.word)) pool = adverbs;
  else if (prepositions.includes(m.word)) pool = prepositions;

  let next = rand(pool);
  while (next === m.surface()) next = rand(pool);
  m.override = next;
  measureMagnet(m);
}

function draw() {
  frame++;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(bg, 0, 0);
  drawFog();

  for (const m of magnets) {
    if (m !== selected) m.update();
    m.draw();
  }

  requestAnimationFrame(draw);
}

canvas.addEventListener("mousedown", e => {
  moved = false;
  const mx = e.clientX - W / 2;
  const my = e.clientY - H / 2;

  for (let i = magnets.length - 1; i >= 0; i--) {
    const m = magnets[i];
    if (m.hit(mx, my)) {
      selected = m;
      selected.selected = true;
      dragOffsetX = m.x - mx;
      dragOffsetY = m.y - my;
      break;
    }
  }
});

canvas.addEventListener("mousemove", e => {
  if (!selected) return;
  moved = true;
  const mx = e.clientX - W / 2;
  const my = e.clientY - H / 2;
  selected.x = mx + dragOffsetX;
  selected.y = my + dragOffsetY;
  selected.tx = selected.x;
  selected.ty = selected.y;
});

canvas.addEventListener("mouseup", () => {
  if (!selected) return;

  selected.selected = false;

  if (!selected.inPoem) {
    selected.homeX = selected.x;
    selected.homeY = selected.y;
  } else if (!moved) {
    swapWord(selected);
    triggerFog();
  }

  selected = null;
});

canvas.addEventListener("dblclick", makePoem);

document.getElementById("shuffle").addEventListener("click", makePoem);
document.getElementById("scatter").addEventListener("click", () => {
  makeMagnets();
  makePoem();
});

window.addEventListener("keydown", e => {
  if (e.key === " " || e.key.toLowerCase() === "s") makePoem();
});

window.addEventListener("resize", () => {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  makeBackground();
  for (const m of magnets) measureMagnet(m);
});

makeBackground();
makeMagnets();
makePoem();
draw();
</script>
</body>
</html>
